# Harness CI — gates the harness's own consistency, plus the project's verification commands.
# This is a STUB. Fill in the build/test/secret-scan/UI steps from docs/agent/02-build-plan.md
# when you instantiate the template. The harness-lint step works as-is.
name: harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, so the secret scan can check it

      - name: Harness consistency lint
        run: sh tools/harness-lint.sh

